name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: shellcheck hooks/session-start.sh hooks/resolve-locale.sh hooks/pr-template-check.sh scripts/check-versions.sh rules-for-ai.sh tests/session-start.test.sh tests/resolve-locale.test.sh tests/pr-template-check.test.sh tests/rules-for-ai.test.sh
      - name: hook tests
        run: |
          sh tests/session-start.test.sh
          sh tests/resolve-locale.test.sh
          sh tests/pr-template-check.test.sh
      - name: installer tests
        run: sh tests/rules-for-ai.test.sh
      - name: installer e2e (claude cells)
        run: |
          npm install -g @anthropic-ai/claude-code
          RULES_FOR_AI_E2E=1 sh tests/rules-for-ai.test.sh
      - name: always-on rule drift check
        # rules/agents.mdc mirrors AGENTS.md behind Cursor's required frontmatter;
        # strip the frontmatter block and compare the body byte-for-byte.
        run: sed '1,/^---$/d' rules/agents.mdc | sed '/./,$!d' | diff AGENTS.md -
      - name: manifest version lockstep
        run: scripts/check-versions.sh
